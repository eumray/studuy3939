<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     .box{
        width:100px;
        height:100px;
        background-color:red;
        border-radius: 8px;;
     }
     .container{
        display:flex;
        gap:10px;
        background: black;;
        height:300px;
        padding:20px;
        box-sizing: border-box;
        margin-bottom:20px;
     }
     .container.ct2{
        justify-content: center;
     }
     .container.ct3{
        justify-content: end;
     }
     .container.ct4{
        justify-content: space-between;
     }
     .container.ct5{
        justify-content:center;
        align-items:center;
        
     }
     .container.ct6{
        justify-content: end;
        align-items: end;

     }
    </style>
</head>

<body>
    <div class="container ct1">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    <div class="container ct2">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    <div class="container ct3">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    <div class="container ct4">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    <div class="container ct5">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    <div class="container ct6">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
  


</body>

</html>
