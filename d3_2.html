<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./d3_2.css">
</head>
<body>
    <div class="page_section">
        <div class="join">
            <div class="logo">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTxzGXLIbes7kcupOpvyeUW69IxcTfhYvSR0w&s"/>
            </div>
            <div class="title">
                나이키 회원가입
            </div>
            <div class="desc">멤버가 되어 나이키가 제공하는
                <br/>최고의 제품과 혜택을 만나보세요.
            </div>
            <div class="sns_section">
                <button class="kakao_bt">카카오톡 로그인</button>
                <button class="facebook_bt">페이스북 로그인</button>
            </div>
            <div class="input_item">
                <select>
                    <option>남자</option>
                    <option>여자</option>
                </select>
            </div>
            <div class="input_item">
                <input type="text" placeholder="아이디"/>
            </div>
            <div class="input_item">
                <input type="password" placeholder="비밀번호"/>
            </div>
            <div class="input_item">
                <input type="password" placeholder="비밀번호 확인"/>
            </div>
            <div class="input_item">
                <input type="text" placeholder="이름"/>
            </div>
            <div class="input_item">
                <input type="phone" placeholder="핸드폰번호"/>
            </div>
            <div class="agree_section">
                <label><input type="checkbox"/>동의합니다.</label>
            </div>
            <div class="bt_section">
                <button class="join_bt">회원가입</button>
            </div>
        </div>
    </div>
   
    
</body>
</html>
